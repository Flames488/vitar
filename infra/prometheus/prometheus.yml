global:
  scrape_interval:     15s   # How often to scrape targets
  evaluation_interval: 15s   # How often to evaluate rules
  scrape_timeout:      10s

  external_labels:
    env: '${ENVIRONMENT:-production}'
    app: 'vitar'

# ── Alertmanager connection ────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
      timeout: 10s

# ── Alerting rules ─────────────────────────────────────────────────────────────
rule_files:
  - "rules/*.yml"

# ── Scrape configs ─────────────────────────────────────────────────────────────
scrape_configs:

  # Vitar API — the main application metrics endpoint
  - job_name: 'vitar_api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    # This endpoint is unauthenticated but bound to internal docker network only.
    # nginx blocks /metrics from the public internet (see nginx.conf).
    scrape_interval: 15s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Redis exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']

  # Postgres exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']

  # Celery / Flower — Flower exposes metrics at /metrics when started with
  # --enable-events. Already running on 127.0.0.1:5555 in docker-compose.
  # - job_name: 'celery_flower'
  #   static_configs:
  #     - targets: ['flower:5555']
  #   metrics_path: '/metrics'
  #   basic_auth:
  #     username: '${FLOWER_USER:-admin}'
  #     password: '${FLOWER_PASSWORD:-vitar_flower}'

  # v10: node-exporter — host CPU / memory / disk / network
  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s
