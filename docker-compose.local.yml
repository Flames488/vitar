# ─── Vitar — Local Dev Compose (Supabase pooler) ─────────────────────────────
#
# Connects directly to Supabase's built-in shared pooler (port 6543).
# No local pgbouncer needed — Supabase handles connection pooling.
#
# Usage:
#   docker compose -f docker-compose.local.yml up --build
# Stop:
#   docker compose -f docker-compose.local.yml down
# ─────────────────────────────────────────────────────────────────────────────

x-api-env: &api-env
  env_file: .env
  environment:
    # App traffic → Supabase transaction pooler (port 6543).
    # Transaction mode is designed for many short-lived connections and has
    # lower per-query overhead than session mode, which matters on a long
    # Nigeria ↔ us-east-1 link.  pool_pre_ping will still work because
    # SELECT 1 has no session state to lose.
    DATABASE_URL: ${SUPABASE_POOLER_URL}
    # Migrations must bypass the pooler (DDL + advisory locks need a true
    # session).  Point at the direct connection string (port 5432).
    MIGRATION_DATABASE_URL: ${SUPABASE_DB_URL}
    REDIS_URL: redis://redis:6379/0
    CELERY_BROKER_URL: redis://redis:6379/1
    CELERY_RESULT_BACKEND: redis://redis:6379/2
    ENVIRONMENT: development
    DEBUG: "true"
    # p95 latency (ms) above which the API fires an "SLA Breach" alert.
    # Raised from the 800ms code default because this dev environment's
    # DB (Supabase, us-east-1) is geographically far from where the app
    # runs — round-trip time alone can exceed 800ms, which previously
    # caused false-positive alerts. Tune this down once you have real
    # numbers for your network, or move the DB closer to reduce it for real.
    API_LATENCY_ALERT_THRESHOLD_MS: ${API_LATENCY_ALERT_THRESHOLD_MS:-3000}

services:

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── FastAPI backend ────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    <<: *api-env
    environment:
      DATABASE_URL: ${SUPABASE_POOLER_URL}
      MIGRATION_DATABASE_URL: ${SUPABASE_DB_URL}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ENVIRONMENT: development
      DEBUG: "true"
      UVICORN_WORKERS: "1"
      LOG_LEVEL: "info"
      SKIP_MIGRATIONS: "false"
      STORAGE_BACKEND: local
      UPLOAD_DIR: /app/uploads
      API_LATENCY_ALERT_THRESHOLD_MS: ${API_LATENCY_ALERT_THRESHOLD_MS:-3000}
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5

  # ── Celery worker ──────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    <<: *api-env
    environment:
      DATABASE_URL: ${SUPABASE_POOLER_URL}
      MIGRATION_DATABASE_URL: ${SUPABASE_DB_URL}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ENVIRONMENT: development
      CELERY_WORKER_HOSTNAME: "worker@%h"
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --queues=notifications,reminders,ai,billing,celery,dead_letter
      --concurrency=2
      --max-tasks-per-child=500
      --hostname=worker@%h
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d worker@$$HOSTNAME --timeout 15 2>&1 | grep -q pong || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s

  # ── Celery Beat scheduler ──────────────────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    <<: *api-env
    environment:
      DATABASE_URL: ${SUPABASE_POOLER_URL}
      MIGRATION_DATABASE_URL: ${SUPABASE_DB_URL}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ENVIRONMENT: development
    command: >
      celery -A app.workers.celery_app beat
      --loglevel=info
      --schedule=/var/celery/celerybeat-schedule
    volumes:
      - celerybeat_data:/var/celery
    depends_on:
      redis:
        condition: service_healthy

  # ── Flower — Celery monitoring UI ─────────────────────────────────────────
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: unless-stopped
    <<: *api-env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: >
      celery -A app.workers.celery_app flower
      --port=5555
      --address=0.0.0.0
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-vitar_flower}
      --url_prefix=flower
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5555/flower/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy

  # ── Nginx ─────────────────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.local.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
      - frontend
      - flower
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
  uploads:
  celerybeat_data:
