x-api-env: &api-env
  env_file: .env
  environment:
    REDIS_URL: redis://redis:6379/0
    CELERY_BROKER_URL: redis://redis:6379/1
    CELERY_RESULT_BACKEND: redis://redis:6379/2

services:

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    environment:
      POSTGRES_USER: vitar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vitar}
      POSTGRES_DB: vitar
      POSTGRES_INITDB_ARGS: "--auth-host=md5"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitar -d vitar"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    command: >
      postgres
        -c password_encryption=md5
        -c max_connections=300
        -c shared_buffers=256MB
        -c effective_cache_size=768MB
        -c work_mem=4MB
        -c checkpoint_completion_target=0.9
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
        -c pg_stat_statements.max=10000

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 60 1
      --save 300 10
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M
    <<: *api-env
    environment:
      # BUG 1 FIX: Route runtime DB traffic through pgbouncer (port 5432 on the
      # pgbouncer service), not directly to postgres. MIGRATION_DATABASE_URL
      # keeps the direct postgres path because Alembic DDL needs session-mode
      # which is incompatible with pgbouncer's transaction-pooling mode.
      DATABASE_URL: postgresql://vitar:${POSTGRES_PASSWORD:-vitar}@pgbouncer:5432/vitar
      MIGRATION_DATABASE_URL: postgresql://vitar:${POSTGRES_PASSWORD:-vitar}@postgres:5432/vitar
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      UVICORN_WORKERS: "${UVICORN_WORKERS:-1}"
      LOG_LEVEL: "info"
      SKIP_MIGRATIONS: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: always
    <<: *api-env
    environment:
      # BUG 1 FIX: Route through pgbouncer, same as api service.
      DATABASE_URL: postgresql://vitar:${POSTGRES_PASSWORD:-vitar}@pgbouncer:5432/vitar
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CELERY_WORKER_HOSTNAME: "worker@%h"
      OPS_MONITORING_ENABLED: "${OPS_MONITORING_ENABLED:-false}"
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --queues=notifications,reminders,ai,billing,celery
      --concurrency=${CELERY_WORKER_CONCURRENCY:-2}
      --max-tasks-per-child=500
      --hostname=worker@%h
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d worker@$$HOSTNAME --timeout 15 2>&1 | grep -q pong || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 5
      start_period: 90s

  worker_dead_letter:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: always
    <<: *api-env
    environment:
      # BUG 1 FIX: Route through pgbouncer, same as api service.
      DATABASE_URL: postgresql://vitar:${POSTGRES_PASSWORD:-vitar}@pgbouncer:5432/vitar
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      CELERY_WORKER_HOSTNAME: "dead_letter@%h"
      OPS_MONITORING_ENABLED: "${OPS_MONITORING_ENABLED:-false}"
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --queues=dead_letter
      --concurrency=1
      --max-tasks-per-child=100
      --hostname=dead_letter@%h
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d dead_letter@$$HOSTNAME --timeout 20 2>&1 | grep -q pong || exit 1"]
      interval: 60s
      timeout: 45s
      retries: 5
      start_period: 90s

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: always
    <<: *api-env
    environment:
      # BUG 1 FIX: Route through pgbouncer, same as api service.
      DATABASE_URL: postgresql://vitar:${POSTGRES_PASSWORD:-vitar}@pgbouncer:5432/vitar
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      OPS_MONITORING_ENABLED: "${OPS_MONITORING_ENABLED:-false}"
    command: >
      celery -A app.workers.celery_app beat
      --loglevel=info
      --schedule=/var/celery/celerybeat-schedule
    volumes:
      - celerybeat_data:/var/celery
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /var/celery/celerybeat-schedule"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 45s

  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: always
    <<: *api-env
    environment:
      DATABASE_URL: postgresql://vitar:${POSTGRES_PASSWORD:-vitar}@pgbouncer:5432/vitar
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: >
      celery -A app.workers.celery_app flower
      --port=5555
      --address=0.0.0.0
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-vitar_flower}
      --url_prefix=flower
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5555/flower/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    restart: always
    ports:
      - "3003:80"
    depends_on:
      api:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
        reservations:
          cpus: '0.02'
          memory: 32M
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  prometheus:
    image: prom/prometheus:v2.51.0
    profiles:
      - observability
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
      - "--web.listen-address=0.0.0.0:9090"
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  alertmanager:
    image: prom/alertmanager:v0.27.0
    profiles:
      - observability
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.02'
          memory: 32M
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
      - "--web.external-url=https://livevault.cloud/alertmanager"
    environment:
      SLACK_WEBHOOK_URL: "${SLACK_WEBHOOK_URL:-}"
    volumes:
      - ./infra/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    ports:
      - "127.0.0.1:9093:9093"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9093/alertmanager/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis_exporter:
    image: oliver006/redis_exporter:v1.62.0-alpine
    profiles:
      - observability
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
        reservations:
          cpus: '0.01'
          memory: 16M
    environment:
      REDIS_ADDR: "redis://redis:6379"
    depends_on:
      - redis

  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    profiles:
      - observability
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
        reservations:
          cpus: '0.01'
          memory: 16M
    environment:
      DATA_SOURCE_NAME: "postgresql://vitar:${POSTGRES_PASSWORD:-vitar}@postgres:5432/vitar?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  grafana:
    image: grafana/grafana:10.4.0
    profiles:
      - observability
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.05'
          memory: 64M
    environment:
      GF_SECURITY_ADMIN_USER: "${GRAFANA_USER:-admin}"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_PASSWORD:-vitar_grafana}"
      GF_SERVER_ROOT_URL: "https://livevault.cloud/grafana"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "127.0.0.1:3001:3000"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  postgres-replica:
    image: bitnami/postgresql:16
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    environment:
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_REPLICATION_USER: replicator
      POSTGRESQL_REPLICATION_PASSWORD: "${POSTGRES_REPLICATION_PASSWORD:-replicator}"
      POSTGRESQL_MASTER_HOST: postgres
      POSTGRESQL_MASTER_PORT_NUMBER: "5432"
      POSTGRESQL_PASSWORD: "${POSTGRES_PASSWORD:-vitar}"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vitar"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    profiles:
      - replica

  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M
        reservations:
          cpus: '0.05'
          memory: 32M
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: vitar
      DB_USER: vitar
      DB_PASSWORD: "${POSTGRES_PASSWORD:-vitar}"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "1000"
      DEFAULT_POOL_SIZE: "20"
      MIN_POOL_SIZE: "5"
      RESERVE_POOL_SIZE: "5"
      RESERVE_POOL_TIMEOUT: "3"
      SERVER_IDLE_TIMEOUT: "600"
      CLIENT_IDLE_TIMEOUT: "0"
      AUTH_TYPE: md5
      # BUG 3 FIX: Added `options` to the ignore list. SQLAlchemy sends
      # `options=-c search_path=...` as a startup parameter; without this,
      # pgbouncer rejects the connection with "unsupported startup parameter".
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,lock_timeout,statement_timeout,idle_in_transaction_session_timeout,search_path,application_name,options
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # BUG 2 FIX: The edoburu/pgbouncer image has no psql binary, so the old
      # healthcheck always failed, permanently blocking every service that
      # depends on pgbouncer with `condition: service_healthy`.
      # Use pgbouncer's own admin console via its built-in `psql`-compatible
      # protocol on port 6432 (the pgbouncer listen port, NOT 5432).
      # `pg_isready` is also not present, so we use nc (netcat) — available in
      # the Alpine-based image — to verify the port is accepting TCP connections.
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  node-exporter:
    image: prom/node-exporter:v1.8.0
    profiles:
      - observability
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 64M
        reservations:
          cpus: '0.01'
          memory: 16M
    command:
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
      - "--collector.disable-defaults"
      - "--collector.cpu"
      - "--collector.meminfo"
      - "--collector.diskstats"
      - "--collector.loadavg"
      - "--collector.netdev"
      - "--collector.filefd"

volumes:
  postgres_data:
  redis_data:
  uploads:
  celerybeat_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:
