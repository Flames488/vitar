worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path        /tmp/nginx_proxy;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml application/manifest+json;

    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:20m rate=120r/m;

    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    upstream flower_backend {
        server flower:5555;
        keepalive 4;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name DOMAIN_PLACEHOLDER www.DOMAIN_PLACEHOLDER app.DOMAIN_PLACEHOLDER api.DOMAIN_PLACEHOLDER;

        # Let's Encrypt challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server ──────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name DOMAIN_PLACEHOLDER www.DOMAIN_PLACEHOLDER app.DOMAIN_PLACEHOLDER api.DOMAIN_PLACEHOLDER;
        client_max_body_size 10M;

        ssl_certificate /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

        # ── PWA service workers ───────────────────────────────────────────
        location = /sw.js {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Service-Worker-Allowed "/" always;
            expires off;
        }

        location = /sw-push.js {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Service-Worker-Allowed "/" always;
            expires off;
        }

        # ── PWA manifest ──────────────────────────────────────────────────
        location = /manifest.json {
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=86400" always;
            add_header Content-Type "application/manifest+json" always;
            expires 1d;
        }

        # ── Health checks ─────────────────────────────────────────────────
        location = /health {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            access_log off;
        }

        location ~ ^/health/(live|ready)$ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Flower (internal tool — basic auth from Flower itself) ────────
        location /flower/ {
            proxy_pass http://flower_backend/flower/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ── Auth endpoints ────────────────────────────────────────────────
        location ~* ^/api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── Push notifications ────────────────────────────────────────────
        location ~* ^/api/v1/push/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── API ───────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
        }

        # ── Uploaded files served directly by nginx ───────────────────────
        # The uploads volume is mounted at /app/uploads in the container
        # and mapped to /app/uploads on the nginx container (read-only).
        location ^~ /uploads/ {
            alias /app/uploads/;
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }

        # ── Static assets (Vite hashed filenames — long cache) ────────────
        location ~* \.(js|css|png|jpg|jpeg|ico|svg|woff|woff2|ttf|webp)$ {
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── SPA fallback ──────────────────────────────────────────────────
        location / {
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }
    }
}
