# Vitar v5 — Production Nginx for labvault.cloud
# No subdomain: frontend + API both on labvault.cloud
# API routes:    https://labvault.cloud/api/...
# Frontend:      https://labvault.cloud/

worker_processes auto;
worker_rlimit_nofile 65535;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path        /tmp/nginx_proxy;
    fastcgi_temp_path      /tmp/nginx_fastcgi;
    uwsgi_temp_path        /tmp/nginx_uwsgi;
    scgi_temp_path         /tmp/nginx_scgi;

    # Performance
    sendfile              on;
    tcp_nopush            on;
    tcp_nodelay           on;
    keepalive_timeout     75;
    keepalive_requests    1000;
    reset_timedout_connection on;
    client_body_timeout   30s;
    send_timeout          30s;

    # Compression
    gzip            on;
    gzip_min_length 1000;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript
               application/x-javascript text/xml application/xml
               application/xml+rss text/javascript image/svg+xml;

    # Security
    server_tokens off;

    # ── Rate-limit zones ────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api:20m     rate=120r/m;
    limit_req_zone $binary_remote_addr zone=booking:10m rate=30r/m;
    limit_req_zone $binary_remote_addr zone=ai:10m      rate=10r/m;

    # ── Upstreams ───────────────────────────────────────────────────────
    # When running multiple API replicas with docker compose scale, Docker's
    # internal DNS resolves the service name `api` to all replica IPs and
    # round-robins across them automatically — no explicit IP list needed.
    #
    # To run 3 API replicas:
    #   docker compose -f docker-compose.yml -f docker-compose.scale.yml up --scale api=3
    #
    # Use the Compose service DNS name. Hard-coded api_1/api_2/api_3 hosts do
    # not exist in the default single-container local stack, so nginx fails.
    upstream api_backend {
        server api:8000 max_fails=3 fail_timeout=30s;
        keepalive 64;
    }

    upstream frontend_backend {
        server frontend:80;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ───────────────────────────────────────────
    server {
        listen 80;
        server_name labvault.cloud www.labvault.cloud;

        # Let's Encrypt ACME challenge (certbot writes here)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://labvault.cloud$request_uri;
        }
    }

    # ── www → non-www redirect (HTTPS) ──────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name www.labvault.cloud;

        ssl_certificate     /etc/letsencrypt/live/labvault.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/labvault.cloud/privkey.pem;

        return 301 https://labvault.cloud$request_uri;
    }

    # ── Main HTTPS server ───────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name labvault.cloud;

        client_max_body_size 10M;

        # SSL (issued by certbot / Let's Encrypt)
        ssl_certificate     /etc/letsencrypt/live/labvault.cloud/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/labvault.cloud/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache   shared:SSL:50m;
        ssl_session_tickets off;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # OCSP stapling
        ssl_stapling        on;
        ssl_stapling_verify on;

        # Auth endpoints — strict rate limit
        location ~* ^/api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            limit_req_status 429;
            proxy_pass         http://api_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # AI endpoints — expensive, rate limited
        location ~* ^/api/v1/ai/ {
            limit_req zone=ai burst=5 nodelay;
            limit_req_status 429;
            proxy_pass         http://api_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_read_timeout 45s;
        }

        # Public booking pages
        location ~* ^/api/v1/booking/ {
            limit_req zone=booking burst=15 nodelay;
            limit_req_status 429;
            proxy_pass         http://api_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # Webhooks — no rate limit (Paystack/Stripe fire fast)
        location ~* ^/api/v1/webhooks/ {
            proxy_pass         http://api_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_read_timeout 30s;
        }

        # Metrics — internal only (Prometheus scrapes from docker network, not public)
        location = /metrics {
            allow 172.16.0.0/12;    # Docker internal networks
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;
            proxy_pass         http://api_backend;
            proxy_set_header   Host $host;
            access_log         off;
        }

        # Grafana — internal dashboards (access via SSH tunnel or VPN)
        location /grafana/ {
            allow 172.16.0.0/12;
            allow 10.0.0.0/8;
            allow 127.0.0.1;
            deny all;
            proxy_pass         http://grafana:3000/grafana/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
        }

        # Health check — no rate limit, no access log
        location = /health {
            proxy_pass       http://api_backend;
            proxy_set_header Host $host;
            access_log       off;
        }

        # All other API routes
        location ~* ^/api/ {
            limit_req zone=api burst=40 nodelay;
            limit_req_status 429;
            proxy_pass         http://api_backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_read_timeout 60s;
        }

        # Static assets — long cache
        location ~* \.(js|css|png|jpg|jpeg|ico|svg|woff|woff2|ttf|webp)$ {
            proxy_pass       http://frontend_backend;
            proxy_set_header Host $host;
            expires          1y;
            add_header       Cache-Control "public, immutable";
            access_log       off;
        }

        # Frontend SPA — all remaining routes
        location / {
            proxy_pass         http://frontend_backend;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_http_version 1.1;
            proxy_set_header   Connection "";
            proxy_intercept_errors on;
            error_page 404 = /index.html;
        }
    }
}
