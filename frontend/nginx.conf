# ====== HTTP server: ACME challenge + redirect everything else to HTTPS ======
server {
    listen 80;
    server_name labvault.cloud;

    # Let's Encrypt webroot verification — must stay reachable over plain HTTP
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else -> HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ====== HTTPS server: your existing config, unchanged, now on 443 ======
server {
    listen 443 ssl;
    http2 on;
    server_name labvault.cloud;

    ssl_certificate     /etc/letsencrypt/live/labvault.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/labvault.cloud/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    root /usr/share/nginx/html;
    index index.html;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Static assets with long cache (Vite hashes filenames)
    location ~* \.(js|css|png|jpg|jpeg|ico|svg|woff|woff2|ttf|webp)$ {
        try_files $uri $uri/ =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Uploads served by API (QR codes, profile images, etc.)
    # ^~ is required here: without it, nginx's regex location above
    # (location ~* \.(js|css|png|...)$) matches *.png files first and
    # wins regardless of declaration order, sending QR code/upload
    # requests to try_files on this frontend container — where they
    # don't exist — instead of proxying to the API container where the
    # files actually live. ^~ tells nginx to stop at this prefix match
    # and skip the regex check entirely once /uploads/ matches.
    location ^~ /uploads/ {
        proxy_pass http://api:8000/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # API proxy
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    location = /health {
        proxy_pass http://api:8000/health;
        proxy_set_header Host $host;
    }

    # SPA fallback — all non-file routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}