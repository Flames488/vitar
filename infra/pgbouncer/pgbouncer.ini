; PgBouncer configuration for Vitar
; Pools 16 Uvicorn workers → 20 real PostgreSQL connections
; CLIENT max: 1000  |  PG max: 20 (well under postgres max_connections=300)

[databases]
; Target DB — substitute ${POSTGRES_DB}, ${POSTGRES_USER}, ${POSTGRES_PASSWORD}
; at deploy time via envsubst or Docker secrets.
vitar = host=postgres port=5432 dbname=${POSTGRES_DB}

[pgbouncer]
;; ── Networking ────────────────────────────────────────────────────────────
listen_addr = 0.0.0.0
listen_port = 5432

;; ── Auth ─────────────────────────────────────────────────────────────────
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

;; ── Pool mode ────────────────────────────────────────────────────────────
; transaction mode: connection returned to pool after every transaction.
; This is required for async SQLAlchemy (asyncpg) because asyncpg pipelines
; multiple transactions on one connection. session mode would pin connections
; to workers, wasting the pool. statement mode breaks multi-statement txns.
pool_mode = transaction

;; ── Pool sizing ──────────────────────────────────────────────────────────
; 16 workers × pool_size=15 = 240 app→PgBouncer connections supported.
; PgBouncer→Postgres: 20 real connections (default_pool_size × 1 database).
; Keeps PG well under its max_connections=300 limit with room for migrations,
; psql admin sessions, and Celery workers.
default_pool_size = 20
max_client_conn = 1000
reserve_pool_size = 5
reserve_pool_timeout = 3.0

;; ── Timeouts ─────────────────────────────────────────────────────────────
server_connect_timeout = 10
server_idle_timeout = 600
client_idle_timeout = 0
query_timeout = 0          ; rely on PostgreSQL statement_timeout instead
query_wait_timeout = 30    ; 30s max wait for a free server connection

;; ── TLS (disable inside Docker network — TLS terminates at Nginx) ────────
server_tls_sslmode = disable
client_tls_sslmode = disable

;; ── Logging ──────────────────────────────────────────────────────────────
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
stats_period = 60

;; ── Admin console ────────────────────────────────────────────────────────
; Connect as pgbouncer user to run SHOW POOLS; SHOW STATS; etc.
admin_users = pgbouncer
stats_users = pgbouncer

;; ── Ignore SET commands from asyncpg ─────────────────────────────────────
; asyncpg sends SET timezone and SET extra_float_digits on connect.
; In transaction mode these are ignored unless we whitelist them.
ignore_startup_parameters = extra_float_digits, options, search_path, application_name
