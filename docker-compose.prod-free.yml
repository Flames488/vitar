# ─── Vitar — Production Compose (Oracle Cloud Free Tier) ─────────────────────
#
# Runs on a single Oracle Cloud Ampere ARM VM (4 CPU / 24GB RAM — always free).
# Postgres is Supabase. Everything else runs on the VM.
#
# Usage on the server:
#   docker compose -f docker-compose.prod-free.yml up -d --build
#
# First deploy (run migrations once, then start):
#   docker compose -f docker-compose.prod-free.yml run --rm api alembic upgrade head
#   docker compose -f docker-compose.prod-free.yml up -d
#
# What's removed vs the original docker-compose.yml:
#   - postgres (replaced by Supabase)
#   - worker_dead_letter (merged into main worker to save RAM)
#   - frontend (built as static files, served by nginx directly from dist/)
#   - prometheus, grafana, alertmanager, redis_exporter, postgres_exporter,
#     node-exporter (observability profile — skip until you can afford it)
#   - postgres-replica (replica profile)
# ─────────────────────────────────────────────────────────────────────────────

x-api-env: &api-env
  env_file: .env
  environment:
    DATABASE_URL: postgresql://postgres:${SUPABASE_DB_PASSWORD}@pgbouncer:5432/postgres
    MIGRATION_DATABASE_URL: ${SUPABASE_DB_URL}
    REDIS_URL: redis://redis:6379/0
    CELERY_BROKER_URL: redis://redis:6379/1
    CELERY_RESULT_BACKEND: redis://redis:6379/2
    ENVIRONMENT: production
    DEBUG: "false"

services:

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 60 1
      --maxmemory 200mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── PgBouncer — pools connections to Supabase ─────────────────────────────
  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
    environment:
      DB_HOST: ${SUPABASE_DB_HOST}
      DB_PORT: "5432"
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: ${SUPABASE_DB_PASSWORD}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "200"
      DEFAULT_POOL_SIZE: "15"
      MIN_POOL_SIZE: "3"
      RESERVE_POOL_SIZE: "5"
      RESERVE_POOL_TIMEOUT: "3"
      SERVER_IDLE_TIMEOUT: "600"
      AUTH_TYPE: md5
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,lock_timeout,statement_timeout,idle_in_transaction_session_timeout,search_path,application_name,options
      SERVER_TLS_SSLMODE: require
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 5432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── FastAPI backend ────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 768M
        reservations:
          cpus: '0.5'
          memory: 256M
    <<: *api-env
    environment:
      DATABASE_URL: postgresql://postgres:${SUPABASE_DB_PASSWORD}@pgbouncer:5432/postgres
      MIGRATION_DATABASE_URL: ${SUPABASE_DB_URL}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ENVIRONMENT: production
      DEBUG: "false"
      UVICORN_WORKERS: "2"
      LOG_LEVEL: "info"
      SKIP_MIGRATIONS: "true"
      STORAGE_BACKEND: local
      ALLOW_LOCAL_UPLOADS_IN_PRODUCTION: "true"
      API_DOCS_ENABLED: "true"
      UPLOAD_DIR: /app/uploads
      FRONTEND_URL: https://${DOMAIN}
      ALLOWED_ORIGINS: '["https://${DOMAIN}","https://www.${DOMAIN}","https://app.${DOMAIN}","https://api.${DOMAIN}"]'
      ALLOWED_HOSTS: '["${DOMAIN}","www.${DOMAIN}","app.${DOMAIN}","api.${DOMAIN}"]'
    depends_on:
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 5

  # ── Celery worker (handles all queues including dead_letter) ──────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: always
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    <<: *api-env
    environment:
      DATABASE_URL: postgresql://postgres:${SUPABASE_DB_PASSWORD}@pgbouncer:5432/postgres
      MIGRATION_DATABASE_URL: ${SUPABASE_DB_URL}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ENVIRONMENT: production
      CELERY_WORKER_HOSTNAME: "worker@%h"
      OPS_MONITORING_ENABLED: "false"
    # All queues merged into one worker to save RAM on the free VM
    command: >
      celery -A app.workers.celery_app worker
      --loglevel=info
      --queues=notifications,reminders,ai,billing,celery,dead_letter
      --concurrency=2
      --max-tasks-per-child=500
      --hostname=worker@%h
    depends_on:
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d worker@$$HOSTNAME --timeout 15 2>&1 | grep -q pong || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 90s

  # ── Celery Beat scheduler ──────────────────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    <<: *api-env
    environment:
      DATABASE_URL: postgresql://postgres:${SUPABASE_DB_PASSWORD}@pgbouncer:5432/postgres
      MIGRATION_DATABASE_URL: ${SUPABASE_DB_URL}
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      ENVIRONMENT: production
    command: >
      celery -A app.workers.celery_app beat
      --loglevel=info
      --schedule=/var/celery/celerybeat-schedule
    volumes:
      - celerybeat_data:/var/celery
    depends_on:
      redis:
        condition: service_healthy

  # ── Flower — Celery monitoring UI ─────────────────────────────────────────
  # Access at: https://yourdomain.com/flower (behind nginx basic auth)
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
    <<: *api-env
    environment:
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    command: >
      celery -A app.workers.celery_app flower
      --port=5555
      --address=0.0.0.0
      --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD}
      --url_prefix=flower
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:5555/flower/healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  # Serves: static frontend dist/, /api/ → FastAPI, /flower → Flower, /uploads/
  # SSL is handled by Certbot (run init-ssl.sh after first deploy)
  nginx:
    image: nginx:alpine
    restart: always
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 64M
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.prod-free.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
      - uploads:/app/uploads:ro
      - ./infra/nginx/certbot/conf:/etc/letsencrypt:ro
      - ./infra/nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
  uploads:
  celerybeat_data:
