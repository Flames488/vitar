worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path        /tmp/nginx_proxy;
    fastcgi_temp_path      /tmp/nginx_fastcgi;
    uwsgi_temp_path        /tmp/nginx_uwsgi;
    scgi_temp_path         /tmp/nginx_scgi;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:20m rate=120r/m;

    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    upstream frontend_backend {
        server frontend:80;
        keepalive 16;
    }

    server {
        listen 80;
        server_name localhost 127.0.0.1 labvault.cloud www.labvault.cloud;
        client_max_body_size 10M;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        location = /health {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            access_log off;
        }

        location ~ ^/health/(live|ready)$ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            access_log off;
        }

        location ~* ^/api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        location /api/ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
        }

        # Clinic-uploaded files (QR codes, logos, etc.) live on the API
        # container's disk at /app/uploads — NOT in the frontend image.
        # This must come before the generic static-asset regex below,
        # otherwise *.png/*.jpg requests under /uploads/ get routed to
        # the frontend container, which doesn't have these files, and
        # 404s.
        location ^~ /uploads/ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }

        location ~* \.(js|css|png|jpg|jpeg|ico|svg|woff|woff2|ttf|webp)$ {
            proxy_pass http://frontend_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        location / {
            proxy_pass http://frontend_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
