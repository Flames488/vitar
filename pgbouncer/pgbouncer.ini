;; Vitar — PgBouncer config (transaction pooling mode)
;;
;; ROOT CAUSE FIX:
;; SQLAlchemy was passing session-level GUC options via connect_args
;; ("-c lock_timeout=... -c statement_timeout=..."). In transaction pooling
;; mode, pgbouncer does not maintain a persistent session per client, so
;; these SET commands are silently dropped and the connection is handed back
;; to the pool. SQLAlchemy's pool_pre_ping then sees a broken connection and
;; closes it immediately (age=0s). This cascades to API healthcheck failure.
;;
;; Fix has two parts:
;;   1. This pgbouncer.ini: set the GUC timeouts as server_connect_query
;;      (applied once when pgbouncer opens a real PG connection) instead of
;;      relying on the client to send them.
;;   2. database.py / .env: move GUC options out of connect_args into
;;      server_connect_query below, and strip them from DATABASE_URL.
;;
;; Pool math:
;;   API workers: 4 (UVICORN_WORKERS default)
;;   SQLAlchemy pool_size=15, max_overflow=25 → 40 conns per worker process
;;   4 workers × 40 = 160 max client connections to pgbouncer
;;   max_client_conn=500 → well within limit
;;   default_pool_size=20 → 20 real PostgreSQL connections (<<< pg max_connections=100)

[databases]
; Route "vitar" database requests to the real PostgreSQL container.
; Use the service name from docker-compose.yml (postgres).
vitar = host=postgres port=5432 dbname=vitar

[pgbouncer]
; Listen on all interfaces inside the container
listen_addr = 0.0.0.0
listen_port = 5432

; Auth file location (must match your docker-compose volume mount)
auth_file = /etc/pgbouncer/userlist.txt
auth_type = scram-sha-256

; -----------------------------------------------------------------
; POOL MODE — transaction is correct for web APIs.
; Session mode would work too but wastes PG connections.
; Statement mode is NOT compatible with SQLAlchemy (multi-statement
; transactions) — never use statement mode with SQLAlchemy.
; -----------------------------------------------------------------
pool_mode = transaction

; Real PG connections pgbouncer keeps open per database+user pair.
; Keep this well below PostgreSQL's max_connections (default 100).
default_pool_size = 20
min_pool_size = 2
reserve_pool_size = 5
reserve_pool_timeout = 3

; Max client connections from the API (across all worker processes).
max_client_conn = 500

; -----------------------------------------------------------------
; KEY FIX: server_connect_query
; Run these SET commands once when pgbouncer opens a new real PG
; connection. This replaces the GUC options that were in SQLAlchemy's
; connect_args (which don't survive transaction pooling).
; -----------------------------------------------------------------
server_connect_query = SET lock_timeout = '10s'; SET statement_timeout = '30s'; SET idle_in_transaction_session_timeout = '60s';

; Reset connection state between transactions (safe for transaction pooling).
; DISCARD ALL would be too expensive; RESET ALL is the right choice.
server_reset_query = RESET ALL

; Only send reset query after a transaction — not needed in session mode
server_reset_query_always = 0

; Connection timeouts
server_connect_timeout = 15
server_login_retry = 1
client_login_timeout = 10
query_timeout = 35
query_wait_timeout = 10

; Keepalive
tcp_keepalive = 1
tcp_keepidle = 60
tcp_keepintvl = 10
tcp_keepcnt = 5

; Logging — reduce noise but keep auth and connection close events
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
; Set to 0 in production to suppress the "login attempt" lines flooding logs
; log_connections = 0

; Admin interface (connect as pgbouncer user to run SHOW POOLS etc.)
admin_users = vitar
stats_users = vitar

; PID file
pidfile = /var/run/pgbouncer/pgbouncer.pid
