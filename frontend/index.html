<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ═══════════════════════════════════════════════════════════════════
         PRIMARY SEO — Brand + Product name linkage
         Google learns: "Vitar" = livevault.cloud
    ════════════════════════════════════════════════════════════════════ -->
    <title>Vitar by LiveVault — Smart Clinic & Appointment Management Software</title>
    <meta name="description" content="Vitar is LiveVault's clinic management platform for Nigerian and African healthcare providers. Book appointments, manage patients, reduce no-shows by 40% with AI reminders. Visit livevault.cloud." />
    <meta name="keywords" content="Vitar, Vitar clinic software, Vitar appointment booking, LiveVault, livevault.cloud, clinic management Nigeria, hospital appointment system Nigeria, healthcare SaaS Africa, appointment scheduling software, patient management system, reduce no-shows, AI appointment reminders" />
    <meta name="author" content="LiveVault (Vitar)" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />

    <!-- Canonical — always points to your real domain -->
    <link rel="canonical" href="https://livevault.cloud/" />

    <!-- ═══════════════════════════════════════════════════════════════════
         OPEN GRAPH — Social sharing (WhatsApp, LinkedIn, Facebook)
    ════════════════════════════════════════════════════════════════════ -->

    <meta property="og:site_name" content="Vitar — by LiveVault" />
    <meta property="og:title" content="Vitar — Clinic Management Software | livevault.cloud" />
    <meta property="og:description" content="Vitar by LiveVault helps Nigerian clinics manage appointments, patients, and billing. Reduce no-shows by 40% with AI-powered reminders. Start your free trial." />
    <meta property="og:url" content="https://livevault.cloud/" />
    <meta property="og:image" content="https://livevault.cloud/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Vitar clinic management dashboard by LiveVault" />
    <meta property="og:locale" content="en_NG" />

         TWITTER CARD
    ════════════════════════════════════════════════════════════════════ -->

    ════════════════════════════════════════════════════════════════════ -->
    <meta name="geo.region" content="NG" />
    <meta name="geo.placename" content="Nigeria" />
    <meta name="ICBM" content="9.0765, 7.3986" />
