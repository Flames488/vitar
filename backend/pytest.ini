[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
filterwarnings =
    ignore::DeprecationWarning:jose.*
    ignore::DeprecationWarning:passlib.*
    ignore::PendingDeprecationWarning

# ── Coverage settings ─────────────────────────────────────────────────────────
# Run with: pytest --cov=app --cov-report=html --cov-report=term-missing
# Coverage targets: 85% lines, 80% branches (up from default)
addopts =
    --strict-markers
    -q

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Custom markers
markers =
    slow: marks tests as slow (deselect with -m "not slow")
    integration: marks tests as integration tests (require live DB)
    unit: marks tests as pure unit tests (no I/O)
    billing: marks tests related to billing logic
    security: marks tests related to security hardening
    ops: marks tests related to ops readiness
