worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path        /tmp/nginx_proxy;
    fastcgi_temp_path      /tmp/nginx_fastcgi;
    uwsgi_temp_path        /tmp/nginx_uwsgi;
    scgi_temp_path         /tmp/nginx_scgi;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    server_tokens off;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml application/manifest+json;

    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api:20m rate=120r/m;

    upstream api_backend {
        server api:8000;
        keepalive 32;
    }

    upstream frontend_backend {
        server frontend:80;
        keepalive 16;
    }

    server {
        listen 80;
        server_name localhost 127.0.0.1 livevault.cloud www.livevault.cloud;
        client_max_body_size 10M;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # ── PWA: Service workers must be served with no-cache headers ──────
        # The browser checks for SW updates on every navigation; a cached SW
        # means clinic users keep running stale code until the cache expires.
        location = /sw.js {
            proxy_pass http://frontend_backend;
            proxy_set_header Host $host;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Service-Worker-Allowed "/" always;
            expires off;
        }

        location = /sw-push.js {
            proxy_pass http://frontend_backend;
            proxy_set_header Host $host;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header Service-Worker-Allowed "/" always;
            expires off;
        }

        # ── PWA manifest — short cache so icon/name changes propagate ─────
        location = /manifest.json {
            proxy_pass http://frontend_backend;
            proxy_set_header Host $host;
            add_header Cache-Control "public, max-age=86400" always;   # 1 day
            add_header Content-Type "application/manifest+json" always;
            expires 1d;
        }

        # ── Health checks ─────────────────────────────────────────────────
        location = /health {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            access_log off;
        }

        location ~ ^/health/(live|ready)$ {
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            access_log off;
        }

        # ── Auth endpoints — stricter rate limit ──────────────────────────
        location ~* ^/api/v1/auth/ {
            limit_req zone=auth burst=10 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── Push subscribe endpoint — authenticated, rate-limited ─────────
        location ~* ^/api/v1/push/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }

        # ── API ───────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_read_timeout 60s;
        }

        # ── Clinic-uploaded files (QR codes, logos) ───────────────────────
        location ^~ /uploads/ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            expires 30d;
            add_header Cache-Control "public";
            access_log off;
        }

        # ── Static assets — long cache (hashed filenames from Vite) ───────
        location ~* \.(js|css|png|jpg|jpeg|ico|svg|woff|woff2|ttf|webp)$ {
            proxy_pass http://frontend_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── SPA fallback ──────────────────────────────────────────────────
        location / {
            proxy_pass http://frontend_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
